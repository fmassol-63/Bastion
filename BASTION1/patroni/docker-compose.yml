# ~/Bastion/BASTION1/patroni/docker-compose.yml
services:
  patroni:
    build: .
    container_name: patroni-1
    env_file:
      - .env
    ports:
      - "5432:5432"
      - "8008:8008"
    volumes:
      - ./pgdata:/home/postgres/pgdata
      - ./config/patroni.yml:/config/patroni.yml:ro
    restart: unless-stopped
