# ~/Bastion/BASTION2/haproxy/haproxy.cfg
global
    maxconn 200
    log stdout format raw local0

defaults
    log global
    mode tcp
    retries 2
    timeout client 30m
    timeout connect 4s
    timeout server 30m
    timeout check 5s

listen postgres_primary
    bind *:6432
    option httpchk GET /leader
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server pg-node1 192.168.200.101:5432 check port 8008
    server pg-node2 192.168.200.103:5432 check port 8008
    server pg-node3 192.168.200.105:5432 check port 8008

listen postgres_replicas
    bind *:6433
    option httpchk GET /replica
    http-check expect status 200
    balance roundrobin
    default-server inter 3s fall 3 rise 2
    server pg-node1 192.168.200.101:5432 check port 8008
    server pg-node2 192.168.200.103:5432 check port 8008
    server pg-node3 192.168.200.105:5432 check port 8008

listen stats
    bind *:7000
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
