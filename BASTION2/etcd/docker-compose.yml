version: "3.8"

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.15
    container_name: etcd-2
    command: >
      etcd
      --name etcd2
      --initial-advertise-peer-urls http://192.168.200.103:2380
      --listen-peer-urls http://0.0.0.0:2380
      --listen-client-urls http://0.0.0.0:2379
      --advertise-client-urls http://192.168.200.103:2379
      --initial-cluster etcd1=http://192.168.200.101:2380,etcd2=http://192.168.200.103:2380,etcd3=http://192.168.200.105:2380
      --initial-cluster-state new
      --initial-cluster-token bastion-etcd
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - ./data:/etcd-data
    restart: unless-stopped
