global_defs {
    script_security
}

vrrp_script chk_haproxy {
    script "/bin/sh -c '/usr/bin/nc -z 127.0.0.1 6432'"
    interval 2
    weight 2
}

vrrp_instance VI_BASTION {
    state BACKUP
    interface ens33
    virtual_router_id 51
    priority 100
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass Azertyuiop123
    }
    virtual_ipaddress {
        192.168.200.110/24
    }
    track_script {
        chk_haproxy
    }
}
